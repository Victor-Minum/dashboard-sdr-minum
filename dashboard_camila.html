<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minum · Desempenho — Camila</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--dark:#083B31;--mint:#00C896;--med:#0D5C47;--light:#EAF5F1;--card:#C5E8DF;--txt:#1A2E28;--sub:#5C7268;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Calibri,'Segoe UI',Arial,sans-serif;}
body{background:var(--dark);min-height:100vh;color:#fff;}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:6px;}
.logo{font-size:26px;font-weight:bold;color:var(--mint);letter-spacing:.5px;}
.logo span{color:#fff;font-weight:normal;}
h1{font-size:30px;margin:14px 0 2px;}
h1 em{color:var(--mint);font-style:normal;}
.sub{color:#9dc4b8;font-size:14px;margin-bottom:22px;}
select{background:var(--med);color:#fff;border:1px solid var(--mint);border-radius:8px;padding:9px 14px;font-size:15px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--med);border-radius:14px;padding:18px 16px;}
.kpi .v{font-size:30px;font-weight:bold;color:var(--mint);}
.kpi .l{font-size:13px;color:#cfe8df;margin-top:4px;}
.section{background:var(--light);color:var(--txt);border-radius:16px;padding:22px;margin-bottom:22px;}
.section h2{font-size:19px;margin-bottom:14px;color:var(--dark);}
.bonusgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;}
.bcard{background:var(--card);border-radius:12px;padding:16px;}
.bcard .t{font-weight:bold;font-size:14px;margin-bottom:8px;}
.bar{background:#fff;border-radius:20px;height:14px;overflow:hidden;margin:8px 0 6px;}
.bar>div{height:100%;background:var(--mint);border-radius:20px;transition:width .4s;}
.small{font-size:12px;color:var(--sub);}
.nivel{font-size:14px;font-weight:bold;color:var(--dark);display:flex;align-items:center;}
.big{font-size:28px;font-weight:bold;color:var(--dark);}
.info{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--dark);color:#fff;font-size:11px;font-weight:bold;cursor:help;position:relative;margin-left:7px;flex-shrink:0;}
.info .tip{visibility:hidden;opacity:0;position:absolute;bottom:135%;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 12px;border-radius:8px;font-size:12px;font-weight:normal;width:240px;line-height:1.5;z-index:10;transition:opacity .15s;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.info:hover .tip{visibility:visible;opacity:1;}
.total{background:#fff;border-radius:12px;padding:16px;text-align:center;}
canvas{max-height:300px;}
.chart-wrap{background:#fff;border-radius:12px;padding:14px;margin-top:12px;}
footer{color:#6f978a;font-size:12px;text-align:center;margin-top:10px;}
@media(max-width:600px){h1{font-size:24px}.kpi .v{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">minum<span> · pré-vendas</span></div>
  <select id="selMes"></select>
</header>
<h1>Olá, <em>Camila</em>!</h1>
<div class="sub" id="subTitulo"></div>

<div class="grid" id="kpis"></div>

<div class="section">
  <h2 id="tituloBonus">Níveis do mês</h2>
  <div class="bonusgrid" id="bonus"></div>
</div>

<div class="section">
  <h2>Histórico</h2>
  <div class="grid" id="totais"></div>
  <div class="chart-wrap"><canvas id="chartRM"></canvas></div>
  <div class="chart-wrap"><canvas id="chartValores"></canvas></div>
  <div class="chart-wrap"><canvas id="chartQtd"></canvas></div>
</div>
<footer id="rodape"></footer>
</div>
<script>
const D = {"nome": "Camila", "mes_atual": "2026-07", "serie": [{"mes": "2026-02", "label": "fev/2026", "leads": 1, "reunioes": 0, "assinados": 0, "validados": 0, "atividades": 0, "taxa": 0.0, "ticket": null, "fator": null, "valor_assinado": 0.0, "valor_validado": 0.0, "bonus_reunioes": 0, "bonus_fechamentos": 0, "bonus": 0.0}, {"mes": "2026-03", "label": "mar/2026", "leads": 2, "reunioes": 0, "assinados": 0, "validados": 0, "atividades": 0, "taxa": 0.0, "ticket": null, "fator": null, "valor_assinado": 0.0, "valor_validado": 0.0, "bonus_reunioes": 0, "bonus_fechamentos": 0, "bonus": 0.0}, {"mes": "2026-04", "label": "abr/2026", "leads": 1, "reunioes": 0, "assinados": 0, "validados": 0, "atividades": 0, "taxa": 0.0, "ticket": null, "fator": null, "valor_assinado": 0.0, "valor_validado": 0.0, "bonus_reunioes": 0, "bonus_fechamentos": 0, "bonus": 0.0}, {"mes": "2026-05", "label": "mai/2026", "leads": 5, "reunioes": 0, "assinados": 0, "validados": 0, "atividades": 0, "taxa": 0.0, "ticket": null, "fator": null, "valor_assinado": 0.0, "valor_validado": 0.0, "bonus_reunioes": 0, "bonus_fechamentos": 0, "bonus": 0.0}, {"mes": "2026-06", "label": "jun/2026", "leads": 1, "reunioes": 0, "assinados": 0, "validados": 0, "atividades": 0, "taxa": 0.0, "ticket": null, "fator": null, "valor_assinado": 0.0, "valor_validado": 0.0, "bonus_reunioes": 0, "bonus_fechamentos": 0, "bonus": 0.0}, {"mes": "2026-07", "label": "jul/2026", "leads": 0, "reunioes": 0, "assinados": 0, "validados": 0, "atividades": 21, "taxa": null, "ticket": null, "fator": null, "valor_assinado": 0.0, "valor_validado": 0.0, "bonus_reunioes": 0, "bonus_fechamentos": 0, "bonus": 0.0}], "totais": {"leads": 10, "reunioes": 0, "assinados": 0, "validados": 0, "valor_assinado": 0.0, "valor_validado": 0.0, "atividades": 21, "taxa": 0.0}, "gerado_em": "12/07/2026 21:11"};
const fmtBRL = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const fmtBRL2 = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const sel = document.getElementById('selMes');
D.serie.forEach(m=>{const o=document.createElement('option');o.value=m.mes;o.textContent=m.label;sel.appendChild(o);});
sel.value = D.serie.some(m=>m.mes===D.mes_atual) ? D.mes_atual : D.serie[D.serie.length-1].mes;

const nivelR = n => n>=30?3:n>=20?2:n>=10?1:0;
const nivelV = n => n>=9?3:n>=6?2:n>=3?1:0;
const TIP_R = 'Nível 1: 10 a 19 reuniões → R$250<br>Nível 2: 20 a 29 reuniões → R$750<br>Nível 3: 30 ou mais → R$1.500';
const TIP_V = 'Nível 1: 3 a 5 contratos → R$150<br>Nível 2: 6 a 8 contratos → R$450<br>Nível 3: 9 ou mais → R$900';
const TIP_T = 'Ticket médio até R$3.500 → fator 0,75x<br>R$3.501 a R$4.500 → fator 1,0x<br>Acima de R$4.500 → fator 1,25x<br><br>O fator multiplica o bônus do período.';
const info = tip => `<span class="info">i<span class="tip">${tip}</span></span>`;

function render(){
  const m = D.serie.find(x=>x.mes===sel.value);
  const atual = m.mes === D.mes_atual;
  const kpis = [
    [m.leads,'Leads trabalhados'],[m.reunioes,'Reuniões marcadas'],
    [m.taxa!==null?m.taxa+'%':'—','Taxa de marcação'],[m.atividades,'Atividades (Tentativas de Contato)'],
    [m.assinados,'Contratos assinados'],[fmtBRL(m.valor_assinado),'Valor contratos assinados'],
    [m.validados,'Contratos validados'],[fmtBRL(m.valor_validado),'Valor contratos validados'],
  ];
  document.getElementById('kpis').innerHTML = kpis.map(([v,l])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');
  document.getElementById('subTitulo').textContent = `Resultados de ${m.label} · atualizado em ${D.gerado_em}`;
  document.getElementById('tituloBonus').textContent = (atual?'Bonificação — ':'Níveis — ')+m.label;

  const pR = Math.min(100, m.reunioes/30*100), pF = Math.min(100, m.validados/9*100);
  const fatorTxt = m.fator ? m.fator.toLocaleString('pt-BR')+'x' : '—';
  const ticketTxt = m.ticket ? fmtBRL2(m.ticket) : '—';
  const obsTicket = atual ? '' : `<div class="small" style="margin-top:6px;">Este valor pode ter sido alterado em relação ao valor do seu relatório de bonificação oficial recebido por e-mail.</div>`;
  let html = `
    <div class="bcard"><div class="t">Reuniões marcadas: ${m.reunioes}</div>
      <div class="bar"><div style="width:${pR}%"></div></div>
      <div class="nivel">Nível ${nivelR(m.reunioes)} alcançado ${info(TIP_R)}</div></div>
    <div class="bcard"><div class="t">Contratos validados: ${m.validados}</div>
      <div class="bar"><div style="width:${pF}%"></div></div>
      <div class="nivel">Nível ${nivelV(m.validados)} alcançado ${info(TIP_V)}</div></div>
    <div class="bcard"><div class="t">Ticket médio das reuniões</div>
      <div class="big">${ticketTxt}</div>
      <div class="nivel">Fator: ${fatorTxt} ${info(TIP_T)}</div>${obsTicket}</div>`;
  if (atual) html += `
    <div class="bcard" style="background:var(--dark);color:#fff;"><div class="t" style="color:var(--mint);">Bônus do mês (parcial)</div>
      <div class="big" style="color:var(--mint);">${fmtBRL2(m.bonus)}</div>
      <div class="small" style="color:#9dc4b8;">(R$${m.bonus_reunioes} reuniões + R$${m.bonus_fechamentos} contratos validados) × ${fatorTxt}</div></div>`;
  document.getElementById('bonus').innerHTML = html;
}
sel.addEventListener('change', render);
render();

const T = D.totais;
document.getElementById('totais').innerHTML = [
  [T.leads,'Leads trabalhados (total)'],[T.reunioes,'Reuniões marcadas (total)'],
  [T.taxa!==null?T.taxa+'%':'—','Taxa de marcação média'],[T.atividades,'Atividades (Tentativas de Contato) (total)'],
  [T.assinados,'Contratos assinados (total)'],[fmtBRL(T.valor_assinado),'Valor contratos assinados (total)'],
  [T.validados,'Contratos validados (total)'],[fmtBRL(T.valor_validado),'Valor contratos validados (total)'],
].map(([v,l])=>`<div class="total"><div class="big" style="font-size:22px;">${v}</div><div class="small">${l}</div></div>`).join('');

const labels = D.serie.map(m=>m.label);
new Chart(document.getElementById('chartRM'),{type:'bar',
 data:{labels,datasets:[
  {label:'Ticket médio (R$)',data:D.serie.map(m=>m.ticket),type:'line',order:0,
   borderColor:'#083B31',backgroundColor:'#083B31',tension:.3,spanGaps:true,yAxisID:'y1'},
  {label:'Reuniões marcadas',data:D.serie.map(m=>m.reunioes),order:1,backgroundColor:'#00C896',borderRadius:6}]},
 options:{responsive:true,plugins:{title:{display:true,text:'Reuniões marcadas × Ticket médio por mês'}},
  scales:{y:{beginAtZero:true,title:{display:true,text:'Reuniões'}},
   y1:{beginAtZero:true,position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'Ticket médio (R$)'}}}}});
new Chart(document.getElementById('chartValores'),{type:'bar',
 data:{labels,datasets:[
  {label:'Valor contratos assinados',data:D.serie.map(m=>m.valor_assinado),backgroundColor:'#0D5C47',borderRadius:6},
  {label:'Valor contratos validados',data:D.serie.map(m=>m.valor_validado),backgroundColor:'#00C896',borderRadius:6}]},
 options:{responsive:true,plugins:{title:{display:true,text:'Valor de contratos assinados e validados por mês (R$)'}},
  scales:{y:{beginAtZero:true,ticks:{callback:v=>v.toLocaleString('pt-BR')}}}}});
new Chart(document.getElementById('chartQtd'),{type:'bar',
 data:{labels,datasets:[
  {label:'Contratos assinados',data:D.serie.map(m=>m.assinados),backgroundColor:'#0D5C47',borderRadius:6},
  {label:'Contratos validados',data:D.serie.map(m=>m.validados),backgroundColor:'#00C896',borderRadius:6}]},
 options:{responsive:true,plugins:{title:{display:true,text:'Contratos assinados e validados por mês (qtd)'}},
  scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
document.getElementById('rodape').textContent = `Dados: tabela-mestre Odoo + Onboarding · gerado em ${D.gerado_em}`;
</script>
</body>
</html>
